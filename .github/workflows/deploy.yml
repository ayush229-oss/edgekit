name: Deploy

on:
  push:
    branches: [main]

# ── Frontend ──────────────────────────────────────────────────────────────────
# Vercel's GitHub integration auto-deploys the "edgekit" project on every push.
# rootDirectory = frontend, domain = edgekit.uk. No CI step needed.
#
# ── Backend ───────────────────────────────────────────────────────────────────
# HTTP webhook triggers git clone → file sync → systemctl restart on VPS.

jobs:
  deploy-backend:
    name: Backend -> VPS
    runs-on: ubuntu-latest
    steps:
      - name: Trigger VPS deploy webhook
        run: |
          response=$(curl -fsS --max-time 30 -X POST "http://165.232.178.128:8765/internal/deploy")
          echo "Deploy triggered: $response"
