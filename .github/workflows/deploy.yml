name: Deploy

on:
  push:
    branches: [main]

# ── Backend ───────────────────────────────────────────────────────────────────
# 1. Lint (ruff) + test (pytest) must pass before any deploy fires.
# 2. On success, HTTP webhook triggers git pull → systemctl restart on VPS.
#
# ── Frontend ──────────────────────────────────────────────────────────────────
# deploy-frontend runs vercel --prod then aliases edgekit.uk + www.edgekit.uk.
# Requires VERCEL_TOKEN secret (vercel.com/account/tokens).

jobs:
  test-backend:
    name: Lint & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff pytest pytest-timeout

      - name: Lint (ruff)
        run: ruff check .

      - name: Run tests
        env:
          EDGEKIT_TEST: "1"
          PYTHONPATH: ".."
        run: pytest tests/ -x -q --timeout=60

  deploy-backend:
    name: Backend -> VPS
    runs-on: ubuntu-latest
    needs: test-backend
    steps:
      - name: Trigger VPS deploy webhook
        env:
          EDGEKIT_API_KEY: ${{ secrets.EDGEKIT_API_KEY }}
        run: |
          response=$(curl -fsS --max-time 30 -X POST \
            -H "X-API-Key: ${EDGEKIT_API_KEY}" \
            "http://165.232.178.128:8765/internal/deploy")
          echo "Deploy triggered: $response"

  deploy-frontend:
    name: Frontend -> edgekit.uk
    runs-on: ubuntu-latest
    needs: test-backend
    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_PROJECT_ID: prj_t19N5s9UEPutCLmGPTRZ9kt01XAM
      VERCEL_ORG_ID: team_9WNLaWQuLtQTeqTAiRXE0o8J
    steps:
      - uses: actions/checkout@v4

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Write Vercel project config
        run: mkdir -p frontend/.vercel && printf '{"projectId":"%s","orgId":"%s"}' "$VERCEL_PROJECT_ID" "$VERCEL_ORG_ID" > frontend/.vercel/project.json

      - name: Deploy to Vercel and alias edgekit.uk
        run: |
          DEPLOY_URL=$(vercel --prod --cwd frontend --token "$VERCEL_TOKEN" --yes 2>&1 | grep -Eo 'https://[^ ]+\.vercel\.app' | tail -1)
          echo "Deploy URL: $DEPLOY_URL"
          vercel alias "$DEPLOY_URL" edgekit.uk --token "$VERCEL_TOKEN"
          vercel alias "$DEPLOY_URL" www.edgekit.uk --token "$VERCEL_TOKEN"
