name: Deploy

on:
  push:
    branches: [main]

jobs:
  # ── 1. Deploy frontend to Vercel ──────────────────────────────────────────
  deploy-frontend:
    name: Frontend -> Vercel
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Deploy to Vercel (production)
        working-directory: ./frontend
        env:
          VERCEL_ORG_ID:     ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          VERCEL_TOKEN:      ${{ secrets.VERCEL_TOKEN }}
        run: vercel --prod --yes --token "$VERCEL_TOKEN"

  # ── 2. Deploy backend to VPS ─────────────────────────────────────────────
  deploy-backend:
    name: Backend -> VPS
    runs-on: ubuntu-latest
    steps:
      - name: Setup SSH key
        env:
          SSH_PRIVATE_KEY: ${{ secrets.VPS_SSH_KEY }}
          VPS_HOST:        ${{ secrets.VPS_HOST }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_PRIVATE_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "$VPS_HOST" >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Pull latest code on VPS and restart service
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
        run: |
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no root@"$VPS_HOST" << 'ENDSSH'
          set -e
          rm -rf /tmp/edgekit_deploy
          git clone --depth=1 https://github.com/ayush229-oss/edgekit.git /tmp/edgekit_deploy
          cp -a /tmp/edgekit_deploy/backend/. /opt/edgekit/backend/
          cp /tmp/edgekit_deploy/pyproject.toml /opt/edgekit/pyproject.toml
          rm -rf /tmp/edgekit_deploy
          pip install sentry-sdk pyarrow --break-system-packages -q 2>/dev/null || true
          systemctl restart edgekit-backend
          sleep 5
          systemctl is-active edgekit-backend && echo "Service is active" || systemctl status edgekit-backend --no-pager | head -15
          ENDSSH
