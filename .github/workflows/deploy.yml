name: Deploy

on:
  push:
    branches: [main]

# ── Backend ───────────────────────────────────────────────────────────────────
# 1. Lint (ruff) + test (pytest) must pass before any deploy fires.
# 2. On success, HTTP webhook triggers git pull → systemctl restart on VPS.
#
# ── Frontend ──────────────────────────────────────────────────────────────────
# deploy-frontend runs vercel --prod then aliases edgekit.uk + www.edgekit.uk.
# Requires VERCEL_TOKEN secret (vercel.com/account/tokens).

jobs:
  test-backend:
    name: Lint & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff pytest pytest-timeout

      - name: Lint (ruff)
        run: ruff check .

      - name: Run tests
        env:
          EDGEKIT_TEST: "1"
          PYTHONPATH: ".."
        run: pytest tests/ -x -q --timeout=60

  deploy-backend:
    name: Backend -> VPS
    runs-on: ubuntu-latest
    needs: test-backend
    steps:
      - name: Trigger VPS deploy webhook
        env:
          EDGEKIT_API_KEY: ${{ secrets.EDGEKIT_API_KEY }}
        run: |
          response=$(curl -fsS --max-time 30 -X POST \
            -H "X-API-Key: ${EDGEKIT_API_KEY}" \
            "http://165.232.178.128:8765/internal/deploy")
          echo "Deploy triggered: $response"

  deploy-frontend:
    name: Frontend -> edgekit.uk
    runs-on: ubuntu-latest
    needs: test-backend
    defaults:
      run:
        working-directory: frontend
    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_ORG_ID: team_9WNLaWQuLtQTeqTAiRXE0o8J
      VERCEL_PROJECT_ID: prj_t19N5s9UEPutCLmGPTRZ9kt01XAM
    steps:
      - uses: actions/checkout@v4

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Deploy to Vercel production
        id: deploy
        run: |
          output=$(vercel --prod --yes --token "$VERCEL_TOKEN" 2>&1)
          echo "$output"
          url=$(echo "$output" | grep -o 'https://[^ ]*\.vercel\.app' | tail -1)
          if [ -z "$url" ]; then
            echo "ERROR: could not extract deployment URL from vercel output"
            exit 1
          fi
          echo "url=$url" >> "$GITHUB_OUTPUT"
          echo "Deployed: $url"

      - name: Alias to edgekit.uk
        run: |
          vercel alias "${{ steps.deploy.outputs.url }}" edgekit.uk --token "$VERCEL_TOKEN"
          vercel alias "${{ steps.deploy.outputs.url }}" www.edgekit.uk --token "$VERCEL_TOKEN"
