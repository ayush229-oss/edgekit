name: Deploy

on:
  push:
    branches: [main]

jobs:
  # ── 1. Deploy frontend to Vercel ──────────────────────────────────────────
  deploy-frontend:
    name: Frontend -> Vercel
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Deploy to Vercel (production)
        working-directory: ./frontend
        env:
          VERCEL_ORG_ID:     ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}
          vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}
          vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}

  # ── 2. Deploy backend to VPS ─────────────────────────────────────────────
  deploy-backend:
    name: Backend -> VPS
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Copy backend files to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host:     ${{ secrets.VPS_HOST }}
          username: root
          key:      ${{ secrets.VPS_SSH_KEY }}
          source:   "backend,pyproject.toml"
          target:   "/opt/edgekit"
          overwrite: true

      - name: Install deps and restart service
        uses: appleboy/ssh-action@v1.0.3
        with:
          host:     ${{ secrets.VPS_HOST }}
          username: root
          key:      ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e
            pip install sentry-sdk pyarrow --break-system-packages -q 2>/dev/null || true
            systemctl restart edgekit-backend
            sleep 3
            systemctl is-active edgekit-backend
