name: Deploy

on:
  push:
    branches: [main]

# ── Backend ───────────────────────────────────────────────────────────────────
# 1. Lint (ruff) + test (pytest) must pass before any deploy fires.
# 2. On success, HTTP webhook triggers git pull → systemctl restart on VPS.
#
# ── Frontend ──────────────────────────────────────────────────────────────────
# deploy-frontend runs vercel --prod then aliases edgekit.uk + www.edgekit.uk.
# Requires VERCEL_TOKEN secret (vercel.com/account/tokens).

jobs:
  test-backend:
    name: Lint & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff pytest pytest-timeout

      - name: Lint (ruff)
        run: ruff check .

      - name: Run tests
        env:
          EDGEKIT_TEST: "1"
          PYTHONPATH: ".."
        run: pytest tests/ -x -q --timeout=60

  deploy-backend:
    name: Backend -> VPS
    runs-on: ubuntu-latest
    needs: test-backend
    steps:
      - name: Trigger VPS deploy webhook
        env:
          EDGEKIT_API_KEY: ${{ secrets.EDGEKIT_API_KEY }}
        run: |
          response=$(curl -fsS --max-time 30 -X POST \
            -H "X-API-Key: ${EDGEKIT_API_KEY}" \
            "http://165.232.178.128:8765/internal/deploy")
          echo "Deploy triggered: $response"

  deploy-frontend:
    name: Frontend -> edgekit.uk
    runs-on: ubuntu-latest
    needs: test-backend
    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_PROJECT_ID: prj_t19N5s9UEPutCLmGPTRZ9kt01XAM
      VERCEL_TEAM_ID: team_9WNLaWQuLtQTeqTAiRXE0o8J
    steps:
      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Wait for Vercel deployment and alias
        run: |
          echo "Waiting for Vercel to finish deploying commit $GITHUB_SHA..."
          for i in $(seq 1 40); do
            URL=$(curl -s "https://api.vercel.com/v6/deployments?projectId=$VERCEL_PROJECT_ID&teamId=$VERCEL_TEAM_ID&limit=10" -H "Authorization: Bearer $VERCEL_TOKEN" | python3 -c "import sys,json; deps=json.load(sys.stdin).get('deployments',[]); sha='$GITHUB_SHA'; url=next(('https://'+d['url'] for d in deps if d.get('state')=='READY' and d.get('target')=='production' and d.get('meta',{}).get('githubCommitSha','').startswith(sha[:12])),''); print(url)")
            if [ -n "$URL" ]; then
              echo "Deployment ready: $URL"
              vercel alias "$URL" edgekit.uk --token "$VERCEL_TOKEN"
              vercel alias "$URL" www.edgekit.uk --token "$VERCEL_TOKEN"
              exit 0
            fi
            echo "  attempt $i/40 — not ready yet, waiting 15s..."
            sleep 15
          done
          echo "ERROR: timed out waiting for Vercel deployment of $GITHUB_SHA"
          exit 1
