name: Deploy

on:
  push:
    branches: [main]

# ── Frontend ──────────────────────────────────────────────────────────────────
# Vercel's GitHub integration auto-deploys the "edgekit" project on every push.
# rootDirectory = frontend, domain = edgekit.uk. No CI step needed.
#
# ── Backend ───────────────────────────────────────────────────────────────────
# 1. Lint (ruff) + test (pytest) must pass before any deploy fires.
# 2. On success, HTTP webhook triggers git pull → systemctl restart on VPS.

jobs:
  test-backend:
    name: Lint & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff pytest pytest-timeout

      - name: Lint (ruff)
        run: ruff check . --select E,F,W --ignore E501

      - name: Run tests
        env:
          EDGEKIT_TEST: "1"
          PYTHONPATH: ".."
        run: pytest tests/ -x -q --timeout=60

  deploy-backend:
    name: Backend -> VPS
    runs-on: ubuntu-latest
    needs: test-backend          # ← blocked until tests pass
    steps:
      - name: Trigger VPS deploy webhook
        env:
          EDGEKIT_API_KEY: ${{ secrets.EDGEKIT_API_KEY }}
        run: |
          response=$(curl -fsS --max-time 30 -X POST \
            -H "X-API-Key: ${EDGEKIT_API_KEY}" \
            "http://165.232.178.128:8765/internal/deploy")
          echo "Deploy triggered: $response"
