name: Deploy

on:
  push:
    branches: [main]

# Live hosting (as of 2026-06-13):
#   • Backend  → Railway service `edgekit-v2`. Deployed by the deploy-backend-railway
#     job below once the RAILWAY_TOKEN secret is set (create a project token in the
#     Railway dashboard → repo Settings → Secrets → Actions → add RAILWAY_TOKEN).
#     Until then that job no-ops. The VPS deploy stays as a warm fallback.
#     (Alternative: install the Railway GitHub App on this repo for native
#      push-deploys; then you don't need the token job. Use one or the other.)
#   • Frontend → Vercel project `edgekit`, git-connected; auto-deploys on push.

jobs:
  test-backend:
    name: Lint & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff pytest pytest-timeout

      - name: Lint (ruff)
        run: ruff check .

      - name: Run tests
        env:
          EDGEKIT_TEST: "1"
          PYTHONPATH: ".."
        # Runs the full backend suite (engine correctness + strategy signals +
        # smoke) as a deploy gate, not just tests/.
        run: pytest -q -x --timeout=120

  deploy-backend-railway:
    name: Backend -> Railway
    runs-on: ubuntu-latest
    needs: test-backend
    env:
      RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
    steps:
      - name: Skip notice (token missing)
        if: env.RAILWAY_TOKEN == ''
        run: echo "RAILWAY_TOKEN not set — skipping Railway deploy. Add a project token as the RAILWAY_TOKEN repo secret to enable backend auto-deploy."

      - uses: actions/checkout@v4
        if: env.RAILWAY_TOKEN != ''

      - name: Install Railway CLI
        if: env.RAILWAY_TOKEN != ''
        run: npm i -g @railway/cli

      - name: Deploy backend to Railway
        if: env.RAILWAY_TOKEN != ''
        run: railway up --ci --service edgekit-v2

  deploy-backend-vps:
    name: Backend -> VPS (fallback)
    runs-on: ubuntu-latest
    needs: test-backend
    steps:
      - name: Trigger VPS deploy webhook
        env:
          EDGEKIT_API_KEY: ${{ secrets.EDGEKIT_API_KEY }}
        run: |
          response=$(curl -fsS --max-time 30 -X POST \
            -H "X-API-Key: ${EDGEKIT_API_KEY}" \
            "http://165.232.178.128:8765/internal/deploy")
          echo "VPS deploy triggered: $response"
