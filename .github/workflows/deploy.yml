name: Deploy

on:
  push:
    branches: [main]

# Live hosting (as of 2026-06-13):
#   • Backend  → Railway service `edgekit-v2`, git-connected to this repo.
#     Railway auto-builds + deploys on push (needs the Railway GitHub App granted
#     access to this repo). The VPS deploy below stays as a warm fallback.
#   • Frontend → Vercel project `edgekit`, git-connected; auto-deploys on push.
# This workflow only gates on tests and keeps the VPS backend fallback in sync.

jobs:
  test-backend:
    name: Lint & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff pytest pytest-timeout

      - name: Lint (ruff)
        run: ruff check .

      - name: Run tests
        env:
          EDGEKIT_TEST: "1"
          PYTHONPATH: ".."
        # Runs the full backend suite (engine correctness + strategy signals +
        # smoke) as a deploy gate, not just tests/.
        run: pytest -q -x --timeout=120

  deploy-backend-vps:
    name: Backend -> VPS (fallback)
    runs-on: ubuntu-latest
    needs: test-backend
    steps:
      - name: Trigger VPS deploy webhook
        env:
          EDGEKIT_API_KEY: ${{ secrets.EDGEKIT_API_KEY }}
        run: |
          response=$(curl -fsS --max-time 30 -X POST \
            -H "X-API-Key: ${EDGEKIT_API_KEY}" \
            "http://165.232.178.128:8765/internal/deploy")
          echo "VPS deploy triggered: $response"
