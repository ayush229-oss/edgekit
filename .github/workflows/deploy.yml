name: Deploy

on:
  push:
    branches: [main]

# ── Frontend: auto-deployed by Vercel GitHub integration (edgekit.uk) ────────
# ── Backend:  triggered via HTTP webhook to VPS ───────────────────────────────

jobs:
  deploy-backend:
    name: Backend -> VPS
    runs-on: ubuntu-latest
    steps:
      - name: Trigger VPS deploy webhook
        run: |
          echo "Calling deploy webhook..."
          curl -v --max-time 20 -X POST "http://165.232.178.128:8765/internal/deploy" 2>&1 || true
          echo "done"
