name: Deploy

on:
  push:
    branches: [main]

jobs:
  # ── 1. Deploy frontend to Vercel ──────────────────────────────────────────
  deploy-frontend:
    name: Frontend -> Vercel
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Debug Vercel deploy
        working-directory: ./frontend
        env:
          VERCEL_ORG_ID:     ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          VERCEL_TOKEN:      ${{ secrets.VERCEL_TOKEN }}
        run: vercel --prod --yes --debug --token "$VERCEL_TOKEN" 2>&1 | head -50 || true

      - name: Deploy to Vercel (production)
        working-directory: ./frontend
        env:
          VERCEL_ORG_ID:     ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          VERCEL_TOKEN:      ${{ secrets.VERCEL_TOKEN }}
        run: vercel --prod --yes --token "$VERCEL_TOKEN"

  # ── 2. Deploy backend to VPS via HTTP webhook ────────────────────────────
  deploy-backend:
    name: Backend -> VPS
    runs-on: ubuntu-latest
    steps:
      - name: Trigger VPS deploy webhook
        run: |
          echo "Triggering deploy..."
          response=$(curl -fsS --max-time 15 -X POST "http://${{ secrets.VPS_HOST }}:8765/internal/deploy")
          echo "Response: $response"
